ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.assistant.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/mydb"
    url = ${?DB_URL}
    user = "postgres"
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}   # no hardcoded default — must come from env
    driver = "org.postgresql.Driver"
    poolSize = 10
}
